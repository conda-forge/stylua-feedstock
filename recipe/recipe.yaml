context:
  version: "2.5.2"

package:
  name: stylua
  version: ${{ version }}

source:
  url: https://github.com/JohnnyMorganz/StyLua/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 26a220c7bf3a8f50d12b76c952fc4569a1162e2d002440faac3344a3634db4f2

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - stylua --help

about:
  license: MPL-2.0
  license_file:
    - LICENSE.md
    - THIRDPARTY.yml
  summary: Opinionated Lua code formatter
  homepage: https://github.com/JohnnyMorganz/StyLua
  repository: https://github.com/JohnnyMorganz/StyLua

extra:
  recipe-maintainers:
    - danielnachun
